name: NVIDIA Air Auto Renew

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  renew-topology:
    runs-on: ubuntu-latest

    steps:
      - name: Renew NVIDIA Air Topology
        id: renew
        env:
          AIR_API_TOKEN: ${{ secrets.AIR_API_TOKEN }}
          TOPOLOGY_ID: ${{ secrets.AIR_TOPOLOGY_ID }}
          NGC_ORG: ${{ secrets.NGC_ORG_NAME }}
        run: |
          pip install "air-sdk>=1.0.0" --quiet

          cat > /tmp/renew.py << 'EOF'
import os, sys
from datetime import datetime, timezone, timedelta
from air_sdk import AirApi

api_key = os.environ["AIR_API_TOKEN"]
sim_id  = os.environ["TOPOLOGY_ID"]
org     = os.environ["NGC_ORG"]
expire  = datetime.now(timezone.utc) + timedelta(hours=72)

try:
    api = AirApi.with_api_key(api_key=api_key, org_name=org)
except AttributeError:
    api = AirApi(username="", password=api_key,
                 api_url="https://api.air-ngc.nvidia.com")

sim = api.simulations.get(sim_id)
try:
    sim.set_sleep_time(expire)
except AttributeError:
    sim.update(sleep_at=expire)

print(expire.strftime('%Y-%m-%dT%H:%M:%SZ'))
EOF

          RESULT=$(python3 /tmp/renew.py 2>&1)
          EXIT_CODE=$?
          echo "Python output: ${RESULT}"

          if [ $EXIT_CODE -eq 0 ]; then
            echo "expire_time=${RESULT}" >> "$GITHUB_OUTPUT"
            echo "topology_id=${TOPOLOGY_ID}" >> "$GITHUB_OUTPUT"
          else
            exit 1
          fi

      - name: Telegram 续期成功通知
        if: success()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TOPOLOGY_ID: ${{ steps.renew.outputs.topology_id }}
          EXPIRE_TIME: ${{ steps.renew.outputs.expire_time }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          TEXT="✅ NVIDIA Air 续期成功%0A%0A🖥 拓扑 ID: ${TOPOLOGY_ID}%0A🕐 执行时间: ${NOW}%0A⏱ Sleep 延长至: ${EXPIRE_TIME}%0A🔗 日志: ${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}&text=${TEXT}"

      - name: Telegram 续期失败通知
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TOPOLOGY_ID: ${{ secrets.AIR_TOPOLOGY_ID }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          TEXT="❌ NVIDIA Air 续期失败%0A%0A🖥 拓扑 ID: ${TOPOLOGY_ID}%0A🕐 时间: ${NOW}%0A🔗 日志: ${RUN_URL}%0A%0A⚠️ 请尽快手动续期！"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}&text=${TEXT}"
