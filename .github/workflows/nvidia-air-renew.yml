name: NVIDIA Air Auto Renew

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  renew-topology:
    runs-on: ubuntu-latest

    steps:
      - name: Renew NVIDIA Air Topology
        id: renew
        env:
          AIR_API_TOKEN: ${{ secrets.AIR_API_TOKEN }}
          TOPOLOGY_ID: ${{ secrets.AIR_TOPOLOGY_ID }}
        run: |
          set +e
          HTTP_CODE=$(curl -s -o /tmp/air_response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${AIR_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://dsx-air.nvidia.com/api/v1/simulation/${TOPOLOGY_ID}/control/" \
            -d '{"action": "renew"}')

          BODY=$(cat /tmp/air_response.json)
          echo "http_code=${HTTP_CODE}" >> "$GITHUB_OUTPUT"
          echo "body=${BODY}" >> "$GITHUB_OUTPUT"
          echo "topology_id=${TOPOLOGY_ID}" >> "$GITHUB_OUTPUT"

          if [[ "$HTTP_CODE" == "200" || "$HTTP_CODE" == "201" ]]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Telegram 续期成功通知
        if: success()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TOPOLOGY_ID: ${{ steps.renew.outputs.topology_id }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          TEXT="✅ NVIDIA Air 续期成功%0A%0A🖥 拓扑 ID: ${TOPOLOGY_ID}%0A🕐 时间: ${NOW}%0A⏱ 有效期延长至 72 小时后%0A🔗 日志: ${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}&text=${TEXT}"

      - name: Telegram 续期失败通知
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TOPOLOGY_ID: ${{ secrets.AIR_TOPOLOGY_ID }}
          HTTP_CODE: ${{ steps.renew.outputs.http_code }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          TEXT="❌ NVIDIA Air 续期失败%0A%0A🖥 拓扑 ID: ${TOPOLOGY_ID}%0A🕐 时间: ${NOW}%0A📛 HTTP 状态码: ${HTTP_CODE}%0A🔗 日志: ${RUN_URL}%0A%0A⚠️ 请尽快手动续期！"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}&text=${TEXT}"
