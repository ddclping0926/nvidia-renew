name: NVIDIA Air Auto Renew

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  renew-topology:
    runs-on: ubuntu-latest

    steps:
      - name: Renew NVIDIA Air Topology (延长 sleep 时间72小时)
        id: renew
        env:
          AIR_API_TOKEN: ${{ secrets.AIR_API_TOKEN }}
          TOPOLOGY_ID: ${{ secrets.AIR_TOPOLOGY_ID }}
          NGC_ORG: ${{ secrets.NGC_ORG_NAME }}
        run: |
          pip install air-sdk --quiet

          python3 << 'PYEOF'
          import os
          import sys
          from datetime import datetime, timezone, timedelta
          from air_sdk import AirApi

          api_key    = os.environ["AIR_API_TOKEN"]
          sim_id     = os.environ["TOPOLOGY_ID"]
          org        = os.environ["NGC_ORG"]
          expire     = datetime.now(timezone.utc) + timedelta(hours=72)

          try:
              api = AirApi.with_api_key(api_key=api_key, org_name=org)
              sim = api.simulations.get(sim_id)
              sim.set_sleep_time(expire)
              print(f"SUCCESS expire_time={expire.strftime('%Y-%m-%dT%H:%M:%SZ')}")
              print(f"topology_id={sim_id}")
          except Exception as e:
              print(f"FAILED {e}", file=sys.stderr)
              sys.exit(1)
          PYEOF

          # 提取输出写入 GitHub Output
          OUTPUT=$(python3 -c "
          import os, sys
          from datetime import datetime, timezone, timedelta
          from air_sdk import AirApi
          api_key = os.environ['AIR_API_TOKEN']
          sim_id  = os.environ['TOPOLOGY_ID']
          org     = os.environ['NGC_ORG']
          expire  = datetime.now(timezone.utc) + timedelta(hours=72)
          api = AirApi.with_api_key(api_key=api_key, org_name=org)
          sim = api.simulations.get(sim_id)
          sim.set_sleep_time(expire)
          print(expire.strftime('%Y-%m-%dT%H:%M:%SZ'))
          " 2>/dev/null)

          if [ $? -eq 0 ]; then
            echo "expire_time=${OUTPUT}" >> "$GITHUB_OUTPUT"
            echo "topology_id=${TOPOLOGY_ID}" >> "$GITHUB_OUTPUT"
            echo "续期成功，sleep 时间延长至: ${OUTPUT}"
          else
            echo "续期失败"
            exit 1
          fi

      - name: Telegram 续期成功通知
        if: success()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TOPOLOGY_ID: ${{ steps.renew.outputs.topology_id }}
          EXPIRE_TIME: ${{ steps.renew.outputs.expire_time }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          TEXT="✅ NVIDIA Air 续期成功%0A%0A🖥 拓扑 ID: ${TOPOLOGY_ID}%0A🕐 执行时间: ${NOW}%0A⏱ Sleep 时间延长至: ${EXPIRE_TIME}%0A🔗 日志: ${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}&text=${TEXT}"

      - name: Telegram 续期失败通知
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TOPOLOGY_ID: ${{ secrets.AIR_TOPOLOGY_ID }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          TEXT="❌ NVIDIA Air 续期失败%0A%0A🖥 拓扑 ID: ${TOPOLOGY_ID}%0A🕐 时间: ${NOW}%0A🔗 日志: ${RUN_URL}%0A%0A⚠️ 请尽快手动续期，否则拓扑将进入 sleep 状态！"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}&text=${TEXT}"
